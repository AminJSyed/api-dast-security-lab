name: Security CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-security:
    name: Python Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit semgrep

      - name: Create report folder
        run: |
          mkdir -p ci-reports

      - name: Compile Python files
        run: |
          python -m compileall app python-practice \
            | tee ci-reports/python-compile-report.txt

      - name: Run Bandit security scan
        run: |
          bandit -r app \
            -ll \
            -f json \
            -o ci-reports/bandit-report.json

      - name: Run pip-audit dependency scan
        run: |
          pip-audit -r requirements.txt \
            -f json \
            -o ci-reports/pip-audit-report.json

      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config p/python \
            --config p/secrets \
            --json \
            --output ci-reports/semgrep-report.json \
            app scripts

      - name: Upload Python security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-security-reports
          path: ci-reports/
          if-no-files-found: warn
          retention-days: 14

  container-security:
    name: Container Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create report folder
        run: |
          mkdir -p ci-reports

      - name: Build Docker image
        run: |
          docker build \
            -t api-dast-security-lab:ci .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: api-dast-security-lab:ci
          format: table
          output: ci-reports/trivy-image-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: ci-reports/trivy-image-report.txt
          if-no-files-found: warn
          retention-days: 14

  authenticated-dast:
    name: Authenticated DAST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Start API
        run: |
          cp .env.example .env
          docker compose up -d --build
          sleep 10

      - name: Check API health
        run: |
          curl http://localhost:8010/health

      - name: Run authenticated ZAP scan
        continue-on-error: true
        run: |
          ./scripts/run-zap-auth-api-scan.sh \
            reports/zap-ci-auth-api-report.html

      - name: Upload ZAP DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-authenticated-dast-report
          path: reports/zap-ci-auth-api-report.html
          if-no-files-found: warn
          retention-days: 14
